  <script>
    function renderWishlist() {
      const root = document.getElementById('wishlist-root');
      const wishlist = getWishlist();
      if (!wishlist.length) {
        root.innerHTML = '<p class="col-span-full text-slate-500 dark:text-slate-400 bg-white/40 dark:bg-black/10 border border-black/5 dark:border-white/10 rounded-2xl p-6 text-center">Your wishlist is empty. Explore products to add sarees!</p>';
        return;
      }

      root.innerHTML = wishlist
        .map((item, idx) => {
          const productIndex = products.findIndex(p => p.name === item.name);
          const formattedPrice = Math.round(item.price).toLocaleString('en-IN');
          const formattedOriginal = Math.round(item.originalPrice).toLocaleString('en-IN');
          const discountPercent = Math.round(((item.originalPrice - item.price) / item.originalPrice) * 100);
          const rating = item.rating || 4.5;
          return `
            <li class="group col-span-1 flex flex-col rounded-3xl overflow-hidden bg-white/70 dark:bg-[#0f1f41]/60 border border-black/5 dark:border-white/10 shadow-sm hover:shadow-lg transition-all duration-300 backdrop-blur-md">
              <!-- Image -->
              <div class="relative overflow-hidden aspect-[3/4] bg-[#0c1e44]/5 dark:bg-black/20 p-2">
                <img src="${item.image}" alt="${item.name}" data-product-index="${productIndex}" class="product-image-tap w-full h-full object-cover rounded-2xl transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                
                <!-- Rating Badge -->
                <div class="absolute bottom-4 left-4 bg-white dark:bg-slate-900 text-slate-850 dark:text-slate-100 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-0.5 shadow-md z-20">
                  <span>${rating}</span>
                  <span class="text-emerald-600">★</span>
                </div>

                <!-- Floating WhatsApp Shortcut -->
                <button type="button" onclick="shareOnWhatsAppByName('${item.name}'); event.preventDefault(); event.stopPropagation();" class="absolute top-4 right-4 bg-[#25D366] hover:bg-emerald-600 text-white p-2.5 rounded-full shadow-lg transition-all hover:scale-110 active:scale-95 cursor-pointer z-20 flex items-center justify-center border border-white/20" title="Ask for Second Opinion on WhatsApp">
                  <svg class="size-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12.012 2c-5.506 0-9.972 4.466-9.972 9.974 0 1.758.459 3.479 1.33 5.003L2.028 22l5.166-1.355a9.92 9.92 0 0 0 4.814 1.258h.004c5.503 0 9.973-4.467 9.973-9.975C21.985 6.467 17.518 2 12.012 2zm5.727 13.993c-.25.707-1.464 1.3-2.025 1.385-.561.085-1.042.348-3.486-.643-2.937-1.196-4.81-4.184-4.957-4.382-.148-.198-1.197-1.591-1.197-3.036 0-1.444.757-2.15 1.026-2.433.269-.283.593-.354.79-.354.198 0 .396.002.567.01.178.008.419-.068.657.506.25.599.852 2.083.926 2.233.074.15.124.325.025.525-.099.2-.148.324-.297.499-.148.175-.313.39-.446.524-.148.15-.304.312-.132.607.172.296.764 1.259 1.636 2.036.873.778 1.611 1.018 1.908 1.168.297.15.469.125.643-.075.172-.2.757-.881.956-1.181.2-.3.4-.25.674-.15.275.1 1.748.824 2.049.975.301.15.501.225.576.35.074.125.074.723-.176 1.43z"/></svg>
                </button>

                <!-- Action Overlay -->
                <div class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 pointer-events-none group-hover:pointer-events-auto transition-opacity duration-300 flex items-center justify-center gap-3">
                  <button onclick="moveToCart(${idx})" class="p-3 bg-white dark:bg-slate-900 hover:bg-[#F1BF0A] dark:hover:bg-[#F1BF0A] text-slate-800 dark:text-slate-100 rounded-full shadow-md transition-colors duration-200 cursor-pointer" title="Move to Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" /></svg>
                  </button>
                  <button onclick="removeFromWishlist(${idx})" class="p-3 bg-white dark:bg-slate-900 hover:bg-rose-500 hover:text-white text-slate-800 dark:text-slate-100 rounded-full shadow-md transition-colors duration-200 cursor-pointer" title="Remove from Wishlist">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg>
                  </button>
                  <button onclick="const pIdx = window.products.findIndex(p => p.name === '${item.name}'); if (pIdx !== -1) { openQuickView(pIdx); } else { showToast('Product details not found!', 'error'); }; event.preventDefault(); event.stopPropagation();" class="p-3 bg-white dark:bg-slate-900 hover:bg-[#183fad] hover:text-white text-slate-800 dark:text-slate-100 rounded-full shadow-md transition-colors duration-200 cursor-pointer" title="Quick View">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.43 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                  </button>
                </div>
              </div>
              <!-- Details -->
              <div class="p-3 sm:p-4 flex flex-col justify-between flex-1 bg-white/40 dark:bg-black/10">
                <div>
                  <h3 class="font-bold text-slate-800 dark:text-slate-100 text-sm group-hover:text-[#183fad] dark:group-hover:text-[#F1BF0A] transition-colors duration-200 truncate">${item.name}</h3>
                  <div class="text-[#16a34a] dark:text-[#25D366] text-xs font-semibold mt-1">${discountPercent}% OFF</div>
                </div>
                <div class="mt-1.5 flex items-center justify-between">
                  <div class="flex flex-col">
                    <div class="flex items-center gap-2">
                      <span class="text-sm line-through text-slate-450 dark:text-slate-400">₹${formattedOriginal}</span>
                      <span class="text-lg font-bold text-slate-900 dark:text-white">₹${formattedPrice}</span>
                    </div>
                    <div class="text-[#16a34a] dark:text-[#25D366] text-[11px] font-bold mt-0.5">Hot Deal</div>
                  </div>
                </div>
              </div>
            </li>
          `;
        }).join("");
    }

    window.moveToCart = function(index) {
      const wishlist = getWishlist();
      const item = wishlist[index];
      if (!item) return;
      
      const cart = getCart();
      const existing = cart.find(p => p.name === item.name);
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        cart.push({ ...item, qty: 1 });
      }
      saveCart(cart);
      
      // Remove from wishlist
      wishlist.splice(index, 1);
      saveWishlist(wishlist);
      
      renderWishlist();
      updateCounts();
      showToast(`"${item.name}" moved to Cart!`, 'success');
    };

    window.removeFromWishlist = function(index) {
      const wishlist = getWishlist();
      const item = wishlist[index];
      if (!item) return;
      
      wishlist.splice(index, 1);
      saveWishlist(wishlist);
      
      renderWishlist();
      updateCounts();
      showToast(`"${item.name}" removed from Wishlist.`, 'info');
    };

    renderWishlist();
  </script>
</body>
</html>
